<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ к отчетам — Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header__container">
            <div class="header__logo">root@hacker_reg:~#</div>
            <button class="header__menu-btn" aria-label="Открыть меню">[=]</button>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="index.html" class="nav__link">Главная</a></li>
                    <li><a href="services.html" class="nav__link">Услуги</a></li>
                    <li><a href="registration.html" class="nav__link nav__link_active">Регистрация</a></li>
                    <li><a href="account.html" class="nav__link">Кабинет</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="auth-section">
            <h1 class="auth-section__title" id="auth-title">Создать аккаунт заказчика</h1>
            
            <form class="form" id="registration-form" action="#" method="POST" novalidate>
                <div class="form__group" id="group-username">
                    <label for="username" class="form__label">Имя заказчика / Организация</label>
                    <input type="text" id="username" class="form__input" required>
                </div>

                <div class="form__group">
                    <label for="email" class="form__label">E-mail</label>
                    <input type="email" id="email" class="form__input" required>
                    <div class="form__error-message" id="email-error"></div>
                </div>

                <div class="form__group">
                    <label for="password" class="form__label">Пароль</label>
                    <input type="password" id="password" class="form__input" required>
                    <div class="form__error-message" id="password-error"></div>
                </div>

                <div class="form__group js-reg-only">
                    <label for="confirm-password" class="form__label">Подтверждение пароля</label>
                    <input type="password" id="confirm-password" class="form__input" required>
                    <div class="form__error-message" id="confirm-password-error"></div>
                </div>

                <div class="form__group js-reg-only">
                    <label class="form__checkbox-label">
                        <input type="checkbox" id="agreement" class="form__checkbox" required>
                        <span>Я даю согласие на безопасную обработку персональных данных.</span>
                    </label>
                    <div class="form__error-message" id="agreement-error"></div>
                </div>

                <button type="submit" class="form__submit-btn" id="submit-btn">Зарегистрироваться</button>
            </form>

            <div class="auth-section__footer" id="auth-footer-text">
                Уже есть аккаунт? <a href="#" class="auth-section__link" id="auth-toggle-link">Войти</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer__container">
            <div class="footer__copy">&copy; 2026 PORTFOLIO. ВСЕ ПРАВА ЗАЩИЩЕНЫ.</div>
            <div class="footer__socials">
                <a href="#" class="footer__link">GitHub</a>
                <a href="#" class="footer__link">Discord</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
